<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Snake Game Ultimate</title>
    <link rel="stylesheet" href="style1.css" />
  </head>
  <body>
    <h1>🐍 Snake Game</h1>

    <div class="info">
      <div>Score: <span id="score">0</span></div>
      <div>High Score: <span id="highScore">0</span></div>
      <div class="mode-text">Mode: <span id="currentMode">Medium</span></div>
    </div>

    <div class="modes">
      <button onclick="setMode('easy')">Easy</button>
      <button onclick="setMode('medium')">Medium</button>
      <button onclick="setMode('hard')">Hard</button>
    </div>

    <div id="gameBoard"></div>

    <div class="controls">
      <button onclick="restartGame()">Restart</button>
      <button onclick="togglePause()" id="pauseBtn">Pause</button>
    </div>
  </body>
</html>
