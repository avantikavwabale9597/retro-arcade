<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1,0" />
    <title>Snake Game</title>
    <link rel="stylesheet" href="snake.css" />
  </head>
  <body>
    <div class="game-container">
      <h1>🐍 Snake Game</h1>

      <div class="info">
        <div>Score: <span id="score">0</span></div>
        <div>High Score: <span id="highScore">0</span></div>
        <div class="mode-text">Mode: <span id="currentMode">Medium</span></div>
      </div>

      <div class="modes">
        <button onclick="setMode('easy')">Easy</button>
        <button onclick="setMode('medium')">Medium</button>
        <button onclick="setMode('hard')">Hard</button>
      </div>

      <div id="gameBoard">
        <div id="cells"></div>

        <div id="overlay" class="overlay">
          <h2 id="overlayText">Ready to Play?</h2>
          <button id="overlayBtn" onclick="startGame()">▶ Play</button>
        </div>
      </div>

      <div class="controls">
        <button onclick="restartGame()">Restart</button>
        <button onclick="togglePause()" id="pauseBtn">Pause</button>
      </div>
    </div>

    <script src="snake.js"></script>
  </body>
</html>
